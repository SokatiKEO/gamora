<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Details</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html"><img src="images/logo.svg" alt="Gamora" class="logo-img"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html">Browse</a></li>
      <li>
        <a href="favorites.html" class="nav-badge">
          ♥ Favorites <span class="badge-count fav-badge">0</span>
        </a>
      </li>
      <li>
        <a href="wishlist.html" class="nav-badge">
          🕐 Wishlist <span class="badge-count wish-badge">0</span>
        </a>
      </li>
    </ul>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="page-content">

    <!-- HERO -->
    <div class="detail-hero">
      <div class="detail-hero-bg"></div>
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-content">
        <img class="detail-cover" src="" alt="">
        <div class="detail-info">
          <h1 class="detail-title">Loading…</h1>
          <div class="detail-meta-row">
            <div class="detail-badge"><i class="fa fa-calendar" aria-hidden="true"></i> <strong class="hero-release">—</strong></div>
            <div class="detail-badge">⭐ <strong class="hero-rating">—</strong> / 5</div>
            <div class="detail-badge">⏱ <strong class="hero-playtime">—</strong> avg</div>
            <div class="metacritic-badge">—</div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-primary" id="detail-fav">♥ Add to Favorites</button>
            <button class="btn btn-secondary" id="detail-wish">🕐 Add to Wishlist</button>
            <a href="browse.html" class="btn btn-ghost">← Back to Browse</a>
          </div>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="detail-body">

      <!-- LEFT: Description + Screenshots -->
      <div>
        <h2 class="detail-heading">ABOUT</h2>
        <div id="game-description" class="detail-description">
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row w-80"></div>
          <div class="skeleton skeleton-row w-90"></div>
        </div>

        <h2 class="detail-heading" style="margin-top:2rem">SCREENSHOTS</h2>
        <div class="screenshots-grid" id="screenshots-grid"></div>
      </div>

      <!-- RIGHT: Info panel -->
      <div id="info-panel" class="detail-panel">
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row w-75"></div>
      </div>

    </div>

    <!-- SIMILAR GAMES -->
    <section class="section flush-top flush-bottom">
      <div class="section-header">
        <h2 class="section-title">
          <span class="section-title-icon"></span>
          Similar Games
        </h2>
      </div>
      <div class="games-grid" id="similar-grid"></div>
    </section>

  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">✕</button>
    <img src="" alt="screenshot">
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><img src="images/logo.svg" alt="Gamora" class="logo-img"></div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="favorites.html">Favorites</a>
        <a href="wishlist.html">Wishlist</a>
      </div>
      <div class="footer-bottom">
        <p class="footer-credit">Built with ♥ for gamers everywhere.</p>
        <div class="footer-socials">
          <a href="#" aria-label="GitHub">⚡</a>
          <a href="#" aria-label="Twitter">🐦</a>
          <a href="#" aria-label="Discord">💬</a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="js/detail.js"></script>
</body>
</html>
