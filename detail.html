<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Details</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .btn-active-fav { background: #ef4444 !important; border-color: #ef4444 !important; color: #fff !important; }
    .btn-active-wish { background: var(--accent3) !important; border-color: var(--accent3) !important; color: #fff !important; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" >GAMORA</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html">Browse</a></li>
      <li>
        <a href="favorites.html" class="nav-badge">
          ♥ Favorites <span class="badge-count fav-badge">0</span>
        </a>
      </li>
      <li>
        <a href="wishlist.html" class="nav-badge">
          🕐 Wishlist <span class="badge-count wish-badge">0</span>
        </a>
      </li>
    </ul>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="page-content">

    <!-- HERO -->
    <div class="detail-hero">
      <div class="detail-hero-bg"></div>
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-content">
        <img class="detail-cover" src="" alt="">
        <div class="detail-info">
          <h1 class="detail-title">Loading…</h1>
          <div class="detail-meta-row">
            <div class="detail-badge">📅 <strong class="hero-release">—</strong></div>
            <div class="detail-badge">⭐ <strong class="hero-rating">—</strong> / 5</div>
            <div class="detail-badge">⏱ <strong class="hero-playtime">—</strong> avg</div>
            <div class="metacritic-badge">—</div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-primary" id="detail-fav">♥ Add to Favorites</button>
            <button class="btn btn-secondary" id="detail-wish">🕐 Add to Wishlist</button>
            <a href="browse.html" class="btn btn-ghost">← Back to Browse</a>
          </div>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="detail-body">

      <!-- LEFT: Description + Screenshots -->
      <div>
        <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin-bottom:1rem;color:var(--text-muted)">ABOUT</h2>
        <div id="game-description" class="detail-description">
          <div class="skeleton" style="height:1rem;margin-bottom:.5rem;border-radius:4px"></div>
          <div class="skeleton" style="height:1rem;margin-bottom:.5rem;width:80%;border-radius:4px"></div>
          <div class="skeleton" style="height:1rem;margin-bottom:.5rem;width:90%;border-radius:4px"></div>
        </div>

        <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin:2rem 0 1rem;color:var(--text-muted)">SCREENSHOTS</h2>
        <div class="screenshots-grid" id="screenshots-grid"></div>
      </div>

      <!-- RIGHT: Info panel -->
      <div id="info-panel" class="detail-panel">
        <div class="skeleton" style="height:1rem;margin-bottom:.75rem;border-radius:4px"></div>
        <div class="skeleton" style="height:1rem;margin-bottom:.5rem;border-radius:4px"></div>
        <div class="skeleton" style="height:1rem;width:75%;border-radius:4px"></div>
      </div>

    </div>

    <!-- SIMILAR GAMES -->
    <section class="section" style="padding-top:0;padding-bottom:4rem">
      <div class="section-header">
        <h2 class="section-title">
          <span class="section-title-icon"></span>
          Similar Games
        </h2>
      </div>
      <div class="games-grid" id="similar-grid"></div>
    </section>

  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">✕</button>
    <img src="" alt="screenshot">
  </div>

  <script type="module" src="js/detail.js"></script>
</body>
</html>
