<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html"><img src="images/logo.svg" alt="Gamora" class="logo-img"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html">Browse</a></li>
      <li>
        <a href="favorites.html" class="nav-badge">
          ♥ Favorites <span class="badge-count fav-badge">0</span>
        </a>
      </li>
      <li>
        <a href="wishlist.html" class="nav-badge">
          🕐 Wishlist <span class="badge-count wish-badge">0</span>
        </a>
      </li>
    </ul>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="page-content">

    <div class="page-hero">
      <h1 class="page-hero-title">Browse Games</h1>
    </div>

    <!-- Mobile filter toggle -->
    <div class="filter-toggle-wrap" id="filter-toggle-wrap">
      <button class="btn btn-ghost filter-toggle-btn" id="filter-toggle">⚙ Show Filters</button>
    </div>

    <div class="browse-layout">

      <!-- SIDEBAR -->
      <aside class="filter-sidebar">
        <div class="filter-title">
          Filters
        </div>

        <!-- Search -->
        <div class="filter-section">
          <div class="filter-label">Search</div>
          <div class="filter-search-wrap">
            <input type="text" class="search-input filter-search-input" id="browse-search"
              placeholder="Search games…">
          </div>
        </div>

        <!-- Platform -->
        <div class="filter-section">
          <div class="filter-label">Platform</div>
          <div class="filter-chips" id="platform-chips"></div>
        </div>

        <!-- Genre -->
        <div class="filter-section">
          <div class="filter-label">Genre</div>
          <div class="filter-chips" id="genre-chips"></div>
        </div>

        <!-- Metacritic -->
        <div class="filter-section">
          <div class="filter-label">Metacritic Score</div>
          <div class="filter-range">
            <input type="number" id="meta-min" placeholder="60" min="0" max="100">
            <span>–</span>
            <input type="number" id="meta-max" placeholder="100" min="0" max="100">
          </div>
        </div>

        <!-- Year -->
        <div class="filter-section">
          <div class="filter-label">Release Year</div>
          <input type="number" class="filter-year-input" id="filter-year"
            placeholder="e.g. 2024" min="1970" max="2026">
        </div>

        <!-- Sort -->
        <div class="filter-section">
          <div class="filter-label">Sort By</div>
          <select class="sort-select" id="sort-select">
            <option value="-rating">Highest Rating</option>
            <option value="-metacritic">Metacritic Score</option>
            <option value="-added">Popularity</option>
            <option value="-released">Newest First</option>
            <option value="released">Oldest First</option>
            <option value="name">Alphabetical A–Z</option>
            <option value="-name">Alphabetical Z–A</option>
          </select>
        </div>

        <button class="filter-apply-btn" id="filter-apply">Apply Filters</button>
        <button class="filter-reset" id="filter-reset">Reset All</button>
      </aside>

      <!-- RESULTS -->
      <div>
        <div class="browse-results-header">
          <p class="result-count" id="result-count">Loading games…</p>
        </div>
        <div class="games-grid" id="browse-grid"></div>
        <div class="load-more-wrap">
          <button class="btn btn-secondary load-more-btn" id="load-more">Load More Games</button>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><img src="images/logo.svg" alt="Gamora" class="logo-img"></div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="favorites.html">Favorites</a>
        <a href="wishlist.html">Wishlist</a>
      </div>
      <div class="footer-bottom">
        <p class="footer-credit">Built with ♥ for gamers everywhere.</p>
        <div class="footer-socials">
          <a href="#" aria-label="GitHub">⚡</a>
          <a href="#" aria-label="Twitter">🐦</a>
          <a href="#" aria-label="Discord">💬</a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="js/browse.js"></script>
  <script>
    if (window.innerWidth < 900) {
      document.getElementById("filter-toggle-wrap").style.display = "block";
    }
  </script>
</body>
</html>
