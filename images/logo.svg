<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff006e"/>
      <stop offset="50%" stop-color="#ff4d9e"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo mark: stylized G with a play/controller motif -->
  <g transform="translate(0, 4)">
    <path d="M18 0C8.06 0 0 8.06 0 18s8.06 18 18 18c4.2 0 8.07-1.44 11.14-3.86l-4.24-5.2C22.92 28.54 20.58 29.5 18 29.5c-6.35 0-11.5-5.15-11.5-11.5S11.65 6.5 18 6.5c3.15 0 6 1.27 8.08 3.32L18 18h13.5c0-9.94-8.06-18-18-18z" 
          fill="url(#glow-grad)" filter="url(#glow)"/>
    <!-- Inner triangle play mark -->
    <path d="M15 12l9 6-9 6V12z" fill="#0a0a0a"/>
  </g>
  
  <!-- Wordmark: GAMORA -->
  <g transform="translate(44, 6)" font-family="'Bebas Neue', sans-serif" font-size="40" letter-spacing="6" filter="url(#glow)">
    <text x="0" y="32" fill="url(#glow-grad)">GAMORA</text>
  </g>
</svg>
